<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheckCheck</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>

  <div class="app">

    <!-- Sidebar (desktop) -->
    <aside class="sidebar">
      <div class="logo">✓✓ <span>Check</span>check</div>
      <nav>
        <button class="nav-item active" data-page="today">
          <span class="nav-icon">☀️</span> Today
        </button>
        <button class="nav-item" data-page="work">
          <span class="nav-icon">💼</span> Work
        </button>
        <button class="nav-item" data-page="personal">
          <span class="nav-icon">🏠</span> Personal
        </button>
        <button class="nav-item" data-page="reports">
          <span class="nav-icon">📊</span> Reports
        </button>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="content">
      <div id="page-container"></div>
    </main>

  </div>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav">
    <button class="active" data-page="today">
      <span class="nav-icon">☀️</span>
      Today
    </button>
    <button data-page="work">
      <span class="nav-icon">💼</span>
      Work
    </button>
    <button data-page="personal">
      <span class="nav-icon">🏠</span>
      Personal
    </button>
    <button data-page="reports">
      <span class="nav-icon">📊</span>
      Reports
    </button>
  </nav>

  <script type="module" src="js/app.js"></script>

</body>
</html>
