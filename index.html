<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CheckCheck</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
  <link rel="shortcut icon" href="assets/icon-192.png" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6366F1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CheckCheck" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- App shell -->
  <div id="app">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="var(--accent)"/>
            <!-- left checkmark -->
            <path d="M4 14.5l3.5 3.5 6.5-8" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <!-- right checkmark, identical shape shifted right -->
            <path d="M13 14.5l3.5 3.5 6.5-8" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>CheckCheck</span>
        </div>

        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="work">Work</button>
          <button class="mode-btn" data-mode="personal">Personal</button>
          <div class="mode-slider"></div>
        </div>

        <!-- Export/Import -->
        <button class="header-icon-btn" id="data-btn" title="Data backup">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 1
