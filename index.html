<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CheckCheck</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
  <link rel="shortcut icon" href="assets/icon-192.png" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6366F1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CheckCheck" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- Auth gate (shown until signed in) -->
  <div id="auth-gate" style="display:none;position:fixed;inset:0;background:#fff;z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px">
    <svg width="52" height="52" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="8" fill="var(--accent)"/>
      <path d="M4 14.5l3.5 3.5 6.5-8" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M13 14.5l3.5 3.5 6.5-8" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div style="font-size:1.5rem;font-weight:700;color:var(--text-1)">CheckCheck</div>
    <div style="font-size:.9rem;color:var(--text-2);text-align:center;max-width:280px">Sign in to sync your data across all your devices</div>
    <button id="google-signin-btn" style="display:flex;align-items:center;gap:10px;padding:12px 24px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-1);font-size:.95rem;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4c-7.7 0-14.4 4.4-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5.1l-6.2-5.2C29.4 35.5 26.8 36.5 24 36.5c-5.2 0-9.6-3.4-11.2-8.1l-6.5 5C9.7 39.8 16.4 44 24 44z"/><path fill="#1565C0" d="M43.6 20H24v8h11.3c-.8 2.4-2.4 4.4-4.5 5.8l6.2 5.2C40.8 35.5 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- App shell -->
  <div id="app">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="var(--accent)"/>
            <!-- left checkmark -->
            <path d="M4 14.5l3.5 3.5 6.5-8" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <!-- right checkmark, identical shape shifted right -->
            <path d="M13 14.5l3.5 3.5 6.5-8" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>CheckCheck</span>
        </div>

        <div class="mode-toggle">
          <button class="mode-btn active" data-mode="work">Work</button>
          <button class="mode-btn" data-mode="personal">Personal</button>
          <div class="mode-slider"></div>
        </div>

        <!-- User account button -->
        <button class="header-icon-btn" id="user-btn" title="Account" style="display:none">
          <div id="user-avatar" style="width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;letter-spacing:0">?</div>
        </button>

        <!-- Export/Import (hidden — data lives in Firebase now) -->
        <button class="header-icon-btn" id="data-btn" title="Data backup" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Global timer bar (persists across views) -->
    <div id="global-timer-bar" class="global-timer-bar" style="display:none"></div>

    <!-- Main -->
    <main class="main" id="main-content"></main>


  </div>

  <!-- Modal backdrop -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Add</h2>
        <button class="modal-close" id="modal-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="js/app.js"></script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW reg failed:', e));
      });
    }
  </script>

</body>
</html>
